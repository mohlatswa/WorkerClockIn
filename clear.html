<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>WorkClock-In — Clearing cache</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(160deg, #1E3A8A, #2563EB);
      color: #fff; display: flex; align-items: center;
      justify-content: center; min-height: 100vh; text-align: center;
      padding: 20px;
    }
    h2 { font-size: 1.5rem; margin-bottom: 12px; }
    p  { opacity: .8; font-size: .95rem; }
  </style>
</head>
<body>
<div>
  <h2>⏳ Clearing cached data…</h2>
  <p id="msg">Please wait a moment.</p>
</div>
<script>
(async function () {
  var msg = document.getElementById('msg');
  try {
    var regs = await navigator.serviceWorker.getRegistrations();
    for (var r of regs) { await r.unregister(); }
    var keys = await caches.keys();
    for (var k of keys) { await caches.delete(k); }
    localStorage.removeItem('wc_worker_id');
    msg.textContent = 'Done! Loading the app…';
  } catch (e) {
    msg.textContent = 'Redirecting…';
  }
  setTimeout(function () { window.location.replace('./'); }, 1500);
}());
</script>
</body>
</html>
